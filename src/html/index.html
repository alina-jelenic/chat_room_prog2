<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatRoom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f3ef;
      --surface:   #ffffff;
      --sidebar:   #1a1816;
      --border:    #e2ddd6;
      --text:      #1a1816;
      --muted:     #8a857d;
      --accent:    #2a6049;
      --accent-h:  #1f4a37;
      --mine-bg:   #2a6049;
      --mine-text: #ffffff;
      --other-bg:  #ffffff;
      --radius:    10px;
    }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      color: var(--text);
      background: var(--bg);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--sidebar);
      display: flex;
      flex-direction: column;
      padding: 0;
      color: #c8c3bc;
    }

    .sidebar-header {
      padding: 24px 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }

    .wordmark {
      font-family: 'DM Serif Display', serif;
      font-size: 1.25rem;
      color: #fff;
      letter-spacing: -.01em;
    }

    .user-pill {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem;
      font-weight: 500;
      color: #fff;
      flex-shrink: 0;
    }

    .user-name {
      font-size: .8rem;
      color: #a09990;
      font-weight: 400;
    }

    .section-label {
      padding: 20px 20px 8px;
      font-size: .65rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #5a5550;
      font-weight: 500;
    }

    .room-list { flex: 1; overflow-y: auto; padding-bottom: 12px; }

    .room-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      font-size: .85rem;
      color: #8a857d;
      cursor: pointer;
      border-radius: 0;
      transition: background .15s, color .15s;
      user-select: none;
    }

    .room-item::before { content: '#'; font-size: .75rem; color: #5a5550; }

    .room-item:hover   { background: rgba(255,255,255,.05); color: #d0cbc4; }
    .room-item.active  { background: rgba(255,255,255,.08); color: #fff; }
    .room-item.active::before { color: var(--accent); }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,.07);
      font-size: .78rem;
    }

    .logout-btn {
      background: none; border: none;
      color: #5a5550; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: .78rem;
      padding: 0;
      transition: color .2s;
    }
    .logout-btn:hover { color: #c8c3bc; }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chat-header {
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-header-hash { color: var(--muted); font-size: 1rem; }

    .chat-header-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      letter-spacing: -.01em;
    }

    .connection-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #aaa;
      margin-left: auto;
      transition: background .4s;
    }
    .connection-dot.connected { background: #4caf82; }

    .connection-label {
      font-size: .72rem;
      color: var(--muted);
      margin-left: 6px;
    }

    /* ── MESSAGES ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* date separator */
    .date-sep {
      text-align: center;
      font-size: .7rem;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin: 16px 0 8px;
      position: relative;
    }
    .date-sep::before, .date-sep::after {
      content: '';
      position: absolute; top: 50%;
      width: 42%; height: 1px;
      background: var(--border);
    }
    .date-sep::before { left: 0; }
    .date-sep::after  { right: 0; }

    /* message group */
    .msg-group { display: flex; flex-direction: column; gap: 2px; margin-bottom: 10px; }

    .msg-group.mine { align-items: flex-end; }
    .msg-group.other { align-items: flex-start; }

    .msg-meta {
      font-size: .72rem;
      color: var(--muted);
      padding: 0 4px;
      margin-bottom: 3px;
    }

    .bubble {
      max-width: 68%;
      padding: 9px 14px;
      border-radius: 14px;
      font-size: .9rem;
      line-height: 1.45;
      word-break: break-word;
      animation: pop .2s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    .mine  .bubble { background: var(--mine-bg); color: var(--mine-text); border-bottom-right-radius: 4px; }
    .other .bubble { background: var(--other-bg); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

    /* system messages */
    .sys-msg {
      text-align: center;
      font-size: .75rem;
      color: var(--muted);
      font-style: italic;
      margin: 6px 0;
    }

    /* ── INPUT ── */
    .input-area {
      padding: 16px 28px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      transition: border-color .2s, box-shadow .2s;
    }

    .input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(42,96,73,.1);
    }

    #msg-input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 300;
      color: var(--text);
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
    }

    #msg-input::placeholder { color: var(--muted); }

    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .2s, transform .1s;
    }
    .send-btn:hover  { background: var(--accent-h); }
    .send-btn:active { transform: scale(.93); }
    .send-btn svg { display: block; }

    /* ── OFFLINE BANNER ── */
    #offline-banner {
      display: none;
      background: #fff4e0;
      border-bottom: 1px solid #f0d98a;
      padding: 8px 28px;
      font-size: .8rem;
      color: #7a5c00;
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="wordmark">ChatRoom</div>
    <div class="user-pill">
      <div class="avatar" id="user-avatar">?</div>
      <span class="user-name" id="user-display">connecting…</span>
    </div>
  </div>

  <div class="section-label">Rooms</div>
  <div class="room-list"
     id="room-list"
     hx-get="/rooms"
     hx-trigger="load"
     hx-swap="innerHTML">
   </div>


  <div class="sidebar-footer">
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <div id="offline-banner">⚠ Connection lost — trying to reconnect…</div>

  <div class="chat-header">
    <span class="chat-header-hash">#</span>
    <span class="chat-header-name" id="room-title">general</span>
    <div class="connection-dot" id="conn-dot"></div>
    <span class="connection-label" id="conn-label">connecting</span>
  </div>

  <div class="messages" id="messages">
    <div class="date-sep">Today</div>
    <div class="sys-msg">Welcome to #<span id="welcome-room">general</span></div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="msg-input" rows="1"></textarea>
      <button class="send-btn" onclick="sendMessage()" title="Send (Enter)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 8L14 2L8 14L7 9L2 8Z" fill="white" stroke="white" stroke-width=".5" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
</div>
</body>
</html>
