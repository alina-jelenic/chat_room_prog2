<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatRoom — Sign In / Create account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2/dist/htmx.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ef; --surface: #ffffff; --border: #e2ddd6;
      --text: #1a1816; --muted: #8a857d; --accent: #2a6049;
      --accent-h: #1f4a37; --error: #b94040; --radius: 10px;
    }

    body {
      min-height: 100vh; background: var(--bg); display: flex;
      align-items: center; justify-content: center;
      font-family: 'DM Sans', sans-serif; color: var(--text);
    }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; width: 100%; max-width: 420px;
      padding: 48px 44px 40px; box-shadow: 0 4px 40px rgba(0,0,0,0.06);
    }

    .wordmark { font-family: 'DM Serif Display', serif; font-size: 1.6rem; margin-bottom: 8px; }
    .tagline  { font-size: .8rem; color: var(--muted); margin-bottom: 36px;
                text-transform: uppercase; letter-spacing: .04em; }

    /* ── tabs (pure CSS) ── */
    .tab-input { display: none; }

    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .tab-label {
      flex: 1; text-align: center; padding: 12px 16px;
      font-size: .875rem; color: var(--muted); cursor: pointer;
      transition: all 0.2s; font-weight: 500; position: relative;
    }

    #login-tab:checked    ~ .tab-bar .tab-label[for="login-tab"],
    #register-tab:checked ~ .tab-bar .tab-label[for="register-tab"] {
      color: var(--text);
    }

    #login-tab:checked    ~ .tab-bar .tab-label[for="login-tab"]::after,
    #register-tab:checked ~ .tab-bar .tab-label[for="register-tab"]::after {
      content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
      height: 3px; background: var(--accent);
    }

    .form-kartica { display: none; }

    #login-tab:checked    ~ #login-kartica,
    #register-tab:checked ~ #register-kartica { display: block; }

    /* ── fields ── */
    .field { margin-bottom: 18px; }

    label:not(.tab-label) {
      display: block; font-size: .75rem; font-weight: 500; color: var(--muted);
      margin-bottom: 7px; text-transform: uppercase; letter-spacing: .05em;
    }

    input[type="text"], input[type="password"] {
      width: 100%; padding: 11px 14px; border: 1px solid var(--border);
      border-radius: var(--radius); background: var(--bg);
      font-family: 'DM Sans', sans-serif; font-size: .9rem; color: var(--text);
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(42,96,73,.12);
      outline: none;
    }

    .btn {
      width: 100%; padding: 13px; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif;
      font-weight: 500; font-size: .9rem; cursor: pointer; margin-top: 8px;
      transition: background .2s;
    }
    .btn:hover { background: var(--accent-h); }

    .server-msg {
      padding: 11px 14px; border-radius: var(--radius); font-size: .83rem;
      margin-bottom: 18px; display: none;
    }
    .server-msg.error   { background: #fdf0f0; color: var(--error);  border: 1px solid #f3c8c8; display: block; }
    .server-msg.success { background: #edf7f2; color: var(--accent); border: 1px solid #b5dcc8; display: block; }

    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .htmx-request .btn-label       { display: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="wordmark">ChatRoom</div>
  <div class="tagline">Real-time conversations</div>

  <input type="radio" id="login-tab"    name="auth-tab" class="tab-input" checked>
  <input type="radio" id="register-tab" name="auth-tab" class="tab-input">

  <div class="tab-bar">
    <label for="login-tab"    class="tab-label">Sign in</label>
    <label for="register-tab" class="tab-label">Create account</label>
  </div>

  <!-- ── LOGIN ── -->
  <div id="login-kartica" class="form-kartica">
    <div id="login-msg" class="server-msg"></div>

    <form hx-post="/api/login"
          hx-target="#login-msg"
          hx-swap="outerHTML">

      <div class="field">
        <label for="login-username">Username</label>
        <input id="login-username" name="username" type="text"
               placeholder="your username" autocomplete="username"
               minlength="3" maxlength="24"
               pattern="[A-Za-z][A-Za-z0-9_-]{2,23}" required>
      </div>

      <div class="field">
        <label for="login-password">Password</label>
        <input id="login-password" name="password" type="password"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <button class="btn" type="submit">
        <span class="htmx-indicator">Signing in…</span>
        <span class="btn-label">Sign in</span>
      </button>
    </form>
  </div>

  <!-- ── REGISTER ── -->
  <div id="register-kartica" class="form-kartica">
    <div id="register-msg" class="server-msg"></div>

    <form hx-post="/api/register"
          hx-target="#register-msg"
          hx-swap="outerHTML">

      <div class="field">
        <label for="reg-username">Username</label>
        <input id="reg-username" name="username" type="text"
               placeholder="choose a username" autocomplete="username"
               minlength="3" maxlength="24"
               pattern="[A-Za-z][A-Za-z0-9_-]{2,23}"
               title="3–24 znakov; začni s črko, nato uporabi črke, številke, - ali _"
               required>
      </div>

      <div class="field">
        <label for="reg-password">Password</label>
        <input id="reg-password" name="password" type="password"
               placeholder="min. 6 characters" autocomplete="new-password" required>
      </div>

      <div class="field">
        <label for="reg-confirm">Confirm Password</label>
        <input id="reg-confirm" name="confirm" type="password"
               placeholder="repeat password" autocomplete="new-password" required>
      </div>

      <button class="btn" type="submit">
        <span class="htmx-indicator">Creating account…</span>
        <span class="btn-label">Create account</span>
      </button>
    </form>
  </div>
</div>
</body>
</html>
